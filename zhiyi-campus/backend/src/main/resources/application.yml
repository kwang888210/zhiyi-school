server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zhiyi_campus?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true       # 驼峰转换：ban_until_time → banUntilTime
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL（开发阶段开着）
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted          # 全局逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml   # XML 映射文件位置

# 文件上传路径
zhiyi:
  upload-path: ./uploads                     # 图片存储目录
  # JWT 配置
  jwt:
    secret: zhiyi-campus-2026-secret-key-change-in-production
    expiration: 86400000                     # 24小时（毫秒）
  # AI 接口（通义千问 / 文心一言 等，按实际情况填写）
  ai:
    api-url: https://your-ai-api-endpoint
    api-key: your-api-key
    timeout: 5000                            # 超时时间（毫秒）
